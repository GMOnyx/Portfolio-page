<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="38" stroke="white" stroke-width="2.5"/>
  <!-- Left meridian ellipse -->
  <ellipse cx="50" cy="50" rx="16" ry="38" stroke="white" stroke-width="2.5"/>
  <!-- Right meridian ellipse -->
  <ellipse cx="50" cy="50" rx="30" ry="38" stroke="white" stroke-width="2.5"/>
  <!-- Dashed equator -->
  <ellipse cx="50" cy="54" rx="38" ry="11" stroke="white" stroke-width="2" stroke-dasharray="5 4"/>
</svg>
